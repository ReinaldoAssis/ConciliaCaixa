name: Build CaixaPos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "CaixaPos" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaixaPos-${{ matrix.os }}
          path: dist/CaixaPos${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CaixaPos-macos-latest
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: CaixaPos-windows-latest
          path: dist

      - name: Rename macOS binary
        run: mv dist/CaixaPos dist/CaixaPos-macos

      - name: Rename Windows binary
        run: mv dist/CaixaPos.exe dist/CaixaPos-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/CaixaPos-macos
            dist/CaixaPos-windows.exe
          generate_release_notes: true
